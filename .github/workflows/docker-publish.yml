name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Surface the OCI image digest so the build-manifest job below
      # can sign over it as the canonical "binary" identifier (lens's
      # release artifact is the image, not a wheel).
      image_digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        continue-on-error: true  # SBOM is nice-to-have, don't fail build
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ───────────────────────────────────────────────────────────────────
  # Build manifest publication (CIRISLens#2 close, mirrors CIRISPersist)
  #
  # Signs a hybrid Ed25519 + ML-DSA-65 BuildManifest over the published
  # Docker image digest + LensExtras (fastapi_routes, sql_migrations,
  # persist_ref, scrubber_model_sha256). POST to CIRISRegistry's
  # /v1/verify/binary-manifest is gated with continue-on-error until
  # the registry team confirms `--primitive lens` registration +
  # RegisterTrustedPrimitiveKey for our key (open question on
  # CIRISLens#3). Signing + emit + steward-key pre-flight all run
  # unconditionally — provenance pieces are always emitted; only the
  # POST is conditional.
  # ───────────────────────────────────────────────────────────────────
  build-manifest:
    name: Sign + publish lens BuildManifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lens deps for emit_lens_extras
        # emit_lens_extras imports api.main (transitively pulls fastapi
        # for app.routes introspection + spaCy for the pii_scrubber
        # import-time guard). Install only what the import path needs;
        # tests + DB drivers are unnecessary here.
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Emit LensExtras JSON
        env:
          ENV: build  # AV-6 startup gate: skip the IS_PRODUCTION SystemExit
          CIRIS_LENS_MODEL_DIR: /tmp/no-such-dir   # CI doesn't have the model bundle on this runner
        run: |
          mkdir -p dist
          python scripts/emit_lens_extras.py > dist/lens-extras.json
          echo "LensExtras emitted ($(wc -c < dist/lens-extras.json) bytes)"
          jq 'keys' dist/lens-extras.json || true

      - name: Install ciris-build-sign (prebuilt from CIRISVerify v1.8.0 release)
        # Same prebuilt-tarball approach CIRISPersist v0.1.15 settled
        # on — avoids the 5-min cargo install + libtss2-dev dance.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP"
          gh release download v1.8.0 --repo CIRISAI/CIRISVerify \
            --pattern 'ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz'
          tar -xzf ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz
          sudo install -m755 build-tool/ciris-build-sign /usr/local/bin/ciris-build-sign
          sudo install -m755 build-tool/ciris-build-verify /usr/local/bin/ciris-build-verify
          ciris-build-sign --version

      - name: Capture Docker image digest as binary input
        # Docker's release artifact is the OCI image digest; we sign
        # over a small file containing that digest string. Verifiers
        # round-trip: pull image by digest, confirm the same digest
        # string lands in BuildManifest.binary_hash via sha256(digest_file).
        run: |
          DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
          # If the build step didn't expose a digest (older buildx versions),
          # fall back to the commit SHA. Either way, the binary_hash signs
          # something stable + verifiable.
          if [ -z "$DIGEST" ]; then
            DIGEST="commit:${{ github.sha }}"
          fi
          echo "$DIGEST" > dist/binary_digest.txt
          echo "binary digest input: $DIGEST"

      - name: Sign manifest with hybrid Ed25519 + ML-DSA-65
        env:
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET:   ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured (CIRISLens#3)."
            exit 1
          fi
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"
          ciris-build-sign sign \
            --primitive lens \
            --build-id "${{ github.sha }}" \
            --target linux/amd64 \
            --binary dist/binary_digest.txt \
            --binary-version "${{ github.sha }}" \
            --extras dist/lens-extras.json \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id ciris-lens-build-v1 \
            --output dist/lens-manifest.json
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"
          echo "Signed manifest:"
          jq '. | del(.signature_classical, .signature_pqc) | .' dist/lens-manifest.json | head -40

      - name: Pre-flight registry steward-key snapshot
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          REG="${REGISTRY_URL:-https://registry.ciris.ai}"
          echo "Registry steward-key snapshot for ${REG}:"
          curl -sf "${REG}/v1/steward-key" | tee dist/steward-key.json | jq . || \
            echo "::warning::steward-key fetch failed; registry may be down or path differs"

      - name: Build binary-catalog payload for /v1/verify/binary-manifest
        # The registry's POST endpoint expects a binary CATALOG payload,
        # not the signed BuildManifest itself. Per CIRISPersist's
        # successful CI shape (verified against their last green run,
        # registry returned `{"success": true, "manifest_id": "..."}`):
        #
        #   {
        #     "project": "ciris-lens",
        #     "version": "<short-sha>",
        #     "binaries": {"<target>": "sha256:..."},
        #     "generated_at": "<ISO8601 UTC>",
        #     "notes": "<freeform>"
        #   }
        #
        # The signed BuildManifest is a separate Path-C artifact (per
        # CIRISRegistry#5 taxonomy) — uploaded to the GH Actions store
        # below for federation peers / verifier-side consumption. The
        # POST here registers the binary catalog; the registry signs
        # the round-trip GET response server-side using its steward key.
        run: |
          # Lens artifact = OCI multi-arch image. binary_digest contains
          # the buildx digest (sha256:...); we ship that directly under
          # the image-reference key. Multi-arch index → one digest covers
          # both linux/amd64 and linux/arm64.
          DIGEST=$(cat dist/binary_digest.txt | tr -d '[:space:]')
          if [[ ! "$DIGEST" =~ ^sha256: ]]; then
            DIGEST="sha256:$(printf '%s' "$DIGEST" | sha256sum | cut -d' ' -f1)"
          fi
          SHORT_SHA="${GITHUB_SHA:0:8}"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg project "ciris-lens" \
            --arg version "$SHORT_SHA" \
            --arg digest "$DIGEST" \
            --arg generated_at "$GENERATED_AT" \
            --arg notes "CIRIS federation lens substrate; signed BuildManifest available as GH Actions artifact lens-build-manifest-${{ github.sha }} (Path-C consumption). Multi-arch OCI image: linux/amd64 + linux/arm64." \
            '{
               project: $project,
               version: $version,
               binaries: {"oci-multiarch": $digest},
               generated_at: $generated_at,
               notes: $notes
             }' > dist/registry_payload.json
          echo "Registry POST payload:"
          jq . dist/registry_payload.json

      - name: Register binary catalog with CIRISRegistry
        # Both prereqs from CIRISLens#3 confirmed by bridge-ops 2026-05-02:
        # Q1) trusted_primitive_keys row for project="ciris-lens" was
        #     created 2026-05-01 ~22:34 UTC; RegisterTrustedPrimitiveKey
        #     RPC ran successfully.
        # Q2) BuildPrimitive::Lens is a first-class enum variant; no
        #     allowlist gate. POST endpoint accepts the binary-catalog
        #     payload above (matches CIRISPersist's successful pattern).
        # Hard pass/fail.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
        run: |
          REG="${REGISTRY_URL:-https://registry.ciris.ai}"
          if [ -z "${REGISTRY_ADMIN_TOKEN}" ]; then
            echo "::error::REGISTRY_ADMIN_TOKEN not configured"
            exit 1
          fi
          echo "POSTing binary catalog to ${REG}/v1/verify/binary-manifest"
          HTTP_CODE=$(curl -sS -o dist/registry_response.json -w '%{http_code}' \
            -X POST "${REG}/v1/verify/binary-manifest" \
            -H "Authorization: Bearer ${REGISTRY_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @dist/registry_payload.json) || HTTP_CODE="curl_failed"
          echo "registry response: ${HTTP_CODE}"
          jq . dist/registry_response.json 2>/dev/null || cat dist/registry_response.json || true
          case "${HTTP_CODE}" in
            2*)
              echo "::notice::lens binary catalog registered with CIRISRegistry"
              ;;
            *)
              echo "::error::registry POST returned ${HTTP_CODE}"
              exit 1
              ;;
          esac

      - name: Round-trip verify the registered manifest
        # Mirror persist's round-trip step: GET back what we POSTed,
        # confirm the binary digest survived. CIRISPersist#2 close
        # criterion was exactly this — proof the registry stored what
        # we sent without server-side mangling.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          REG="${REGISTRY_URL:-https://registry.ciris.ai}"
          SHORT_SHA="${GITHUB_SHA:0:8}"
          # GET back what we POSTed; registry's GET path shape isn't
          # standardized yet (CIRISRegistry#5 §1-2 documents the
          # evolving paths) — try the three candidates persist's
          # team has surfaced. Loop variable is `endpoint`, NOT
          # `PATH` — shadowing $PATH wipes out executable lookup.
          ORIGINAL_DIGEST=$(jq -r '.binaries["oci-multiarch"]' dist/registry_payload.json)
          echo "POSTed digest: ${ORIGINAL_DIGEST}"
          for endpoint in \
              "function-manifest/${SHORT_SHA}/oci-multiarch" \
              "binary-manifest/${SHORT_SHA}/oci-multiarch" \
              "build-manifest/lens/${SHORT_SHA}/oci-multiarch"; do
            URL="${REG}/v1/verify/${endpoint}?project=ciris-lens"
            OUT="dist/round_trip_${endpoint//\//_}.json"
            HTTP_CODE=$(curl -sS -o "$OUT" -w '%{http_code}' "${URL}") || HTTP_CODE="curl_failed"
            echo "GET ${URL}: ${HTTP_CODE}"
          done
          # Find a returned manifest with our digest. Round-trip mismatch
          # is informational (the registry's GET surface is evolving);
          # POST success is the close criterion.
          for f in dist/round_trip_*.json; do
            [ -f "$f" ] || continue
            FOUND=$(jq -r '.. | objects | select(has("binaries")) | .binaries["oci-multiarch"]? // empty' "$f" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Round-trip digest from $f: ${FOUND}"
              if [ "${FOUND}" = "${ORIGINAL_DIGEST}" ]; then
                echo "::notice::round-trip verified — POSTed digest matches GET response"
                break
              else
                echo "::warning::round-trip mismatch: POSTed=${ORIGINAL_DIGEST} GOT=${FOUND}"
              fi
            fi
          done

      - name: Upload signed manifest + diagnostics as build artifact
        # Always upload — Path-C consumption per CIRISRegistry#5
        # taxonomy. The registry POST above registers a lighter
        # binary-catalog payload; the full signed BuildManifest
        # (with hybrid Ed25519+ML-DSA-65 signature, LensExtras, and
        # provenance metadata) lives here for federation peers /
        # verifier-side consumption.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lens-build-manifest-${{ github.sha }}
          path: |
            dist/lens-extras.json
            dist/lens-manifest.json
            dist/binary_digest.txt
            dist/steward-key.json
            dist/registry_payload.json
            dist/registry_response.json
            dist/round_trip_*.json
          if-no-files-found: warn
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx 'ruff>=0.9.3'

      - name: Lint with ruff
        run: |
          ruff check api/ sdk/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed (some may be skipped without DB)"
