name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Surface the OCI image digest so the build-manifest job below
      # can sign over it as the canonical "binary" identifier (lens's
      # release artifact is the image, not a wheel).
      image_digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        continue-on-error: true  # SBOM is nice-to-have, don't fail build
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ───────────────────────────────────────────────────────────────────
  # Build manifest publication (CIRISLens#2 close, mirrors CIRISPersist)
  #
  # Signs a hybrid Ed25519 + ML-DSA-65 BuildManifest over the published
  # Docker image digest + LensExtras (fastapi_routes, sql_migrations,
  # persist_ref, scrubber_model_sha256). POST to CIRISRegistry's
  # /v1/verify/binary-manifest is gated with continue-on-error until
  # the registry team confirms `--primitive lens` registration +
  # RegisterTrustedPrimitiveKey for our key (open question on
  # CIRISLens#3). Signing + emit + steward-key pre-flight all run
  # unconditionally — provenance pieces are always emitted; only the
  # POST is conditional.
  # ───────────────────────────────────────────────────────────────────
  build-manifest:
    name: Sign + publish lens BuildManifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lens deps for emit_lens_extras
        # emit_lens_extras imports api.main (transitively pulls fastapi
        # for app.routes introspection + spaCy for the pii_scrubber
        # import-time guard). Install only what the import path needs;
        # tests + DB drivers are unnecessary here.
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Emit LensExtras JSON
        env:
          ENV: build  # AV-6 startup gate: skip the IS_PRODUCTION SystemExit
          CIRIS_LENS_MODEL_DIR: /tmp/no-such-dir   # CI doesn't have the model bundle on this runner
        run: |
          mkdir -p dist
          python scripts/emit_lens_extras.py > dist/lens-extras.json
          echo "LensExtras emitted ($(wc -c < dist/lens-extras.json) bytes)"
          jq 'keys' dist/lens-extras.json || true

      - name: Install ciris-build-sign (prebuilt from CIRISVerify v1.8.0 release)
        # Same prebuilt-tarball approach CIRISPersist v0.1.15 settled
        # on — avoids the 5-min cargo install + libtss2-dev dance.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP"
          gh release download v1.8.0 --repo CIRISAI/CIRISVerify \
            --pattern 'ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz'
          tar -xzf ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz
          sudo install -m755 build-tool/ciris-build-sign /usr/local/bin/ciris-build-sign
          sudo install -m755 build-tool/ciris-build-verify /usr/local/bin/ciris-build-verify
          ciris-build-sign --version

      - name: Capture Docker image digest as binary input
        # Docker's release artifact is the OCI image digest; we sign
        # over a small file containing that digest string. Verifiers
        # round-trip: pull image by digest, confirm the same digest
        # string lands in BuildManifest.binary_hash via sha256(digest_file).
        run: |
          DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
          # If the build step didn't expose a digest (older buildx versions),
          # fall back to the commit SHA. Either way, the binary_hash signs
          # something stable + verifiable.
          if [ -z "$DIGEST" ]; then
            DIGEST="commit:${{ github.sha }}"
          fi
          echo "$DIGEST" > dist/binary_digest.txt
          echo "binary digest input: $DIGEST"

      - name: Sign manifest with hybrid Ed25519 + ML-DSA-65
        env:
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET:   ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured (CIRISLens#3)."
            exit 1
          fi
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"
          ciris-build-sign sign \
            --primitive lens \
            --build-id "${{ github.sha }}" \
            --target linux/amd64 \
            --binary dist/binary_digest.txt \
            --binary-version "${{ github.sha }}" \
            --extras dist/lens-extras.json \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id ciris-lens-build-v1 \
            --output dist/lens-manifest.json
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"
          echo "Signed manifest:"
          jq '. | del(.signature_classical, .signature_pqc) | .' dist/lens-manifest.json | head -40

      - name: Pre-flight registry steward-key snapshot
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          REG="${REGISTRY_URL:-https://registry.ciris.ai}"
          echo "Registry steward-key snapshot for ${REG}:"
          curl -sf "${REG}/v1/steward-key" | tee dist/steward-key.json | jq . || \
            echo "::warning::steward-key fetch failed; registry may be down or path differs"

      - name: Register lens BuildManifest with CIRISRegistry
        # Both prereqs from CIRISLens#3 confirmed by bridge-ops 2026-05-02:
        # Q1) trusted_primitive_keys row for project="ciris-lens" was
        #     created 2026-05-01 ~22:34 UTC with our published
        #     ed25519/mldsa65 fingerprints. RegisterTrustedPrimitiveKey
        #     RPC ran successfully.
        # Q2) BuildPrimitive::Lens is a first-class enum variant in
        #     rust-registry/src/build_manifest.rs:31-54 — no allowlist
        #     gate, no server-side LensExtrasValidator (extras are
        #     stored as opaque serde_json::Value; verifier-side is the
        #     extras-validation venue). primitive: "lens" wire shape;
        #     trusted-key DB lookup uses project_name() = "ciris-lens".
        # Hard pass/fail now — registry POST is on the critical path.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
        run: |
          REG="${REGISTRY_URL:-https://registry.ciris.ai}"
          if [ -z "${REGISTRY_ADMIN_TOKEN}" ]; then
            echo "::error::REGISTRY_ADMIN_TOKEN not configured"
            exit 1
          fi
          echo "POSTing lens BuildManifest to ${REG}/v1/verify/binary-manifest"
          HTTP_CODE=$(curl -sS -o dist/registry_response.json -w '%{http_code}' \
            -X POST "${REG}/v1/verify/binary-manifest" \
            -H "Authorization: Bearer ${REGISTRY_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @dist/lens-manifest.json) || HTTP_CODE="curl_failed"
          echo "registry response: ${HTTP_CODE}"
          jq . dist/registry_response.json 2>/dev/null || cat dist/registry_response.json || true
          case "${HTTP_CODE}" in
            2*)
              echo "::notice::lens BuildManifest registered with CIRISRegistry"
              ;;
            401)
              echo "::error::401 — manifest signature didn't verify against the registered trusted_primitive_keys row for ciris-lens. Bridge-ops should re-check that the GHA secret keypair matches the registered ed25519 fingerprint b68ce2f6… and mldsa65 fingerprint 656f9a1f…"
              exit 1
              ;;
            *)
              echo "::error::registry POST returned ${HTTP_CODE}"
              exit 1
              ;;
          esac

      - name: Upload signed manifest as build artifact
        # Always upload — even if the POST was gated. Provides a Path-C
        # (per CIRISRegistry#5 taxonomy) consumption surface: bridge
        # operators can pull the signed manifest from the GH Actions
        # artifact store while the registry-side POST registration is
        # in flight.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lens-build-manifest-${{ github.sha }}
          path: |
            dist/lens-extras.json
            dist/lens-manifest.json
            dist/binary_digest.txt
            dist/steward-key.json
            dist/registry_response.json
          if-no-files-found: warn
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx 'ruff>=0.9.3'

      - name: Lint with ruff
        run: |
          ruff check api/ sdk/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed (some may be skipped without DB)"
